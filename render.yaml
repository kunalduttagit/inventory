# Render Blueprint — one-click deploy for the inventory stack.
# Spins up: managed Postgres + backend (Docker) + frontend (Docker).
#
# Caveat: Next.js bakes NEXT_PUBLIC_API_URL at build time, so the frontend
# needs to know the backend URL before it builds. If Render assigns a
# hostname other than `inventory-backend.onrender.com` (e.g. because the
# name is taken), edit NEXT_PUBLIC_API_URL under inventory-frontend in the
# Render dashboard after first deploy, then click "Manual Deploy → clear
# cache and deploy" on the frontend.

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory
    user: root

services:
  - type: web
    name: inventory-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: LOW_STOCK_THRESHOLD
        value: "10"

  - type: web
    name: inventory-frontend
    runtime: docker
    plan: free
    region: oregon
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://inventory-backend.onrender.com
